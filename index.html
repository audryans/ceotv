<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CEO Ryan Private Stream</title>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxuc3suKfedfLcBIHNkfNQ9kUlZr2y1FQ",
  authDomain: "twitch-user-access.firebaseapp.com",
  projectId: "twitch-user-access",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function normalizePhone(input) {
  let p = input.replace(/\D/g, "");
  if (p.startsWith("0")) p = "254" + p.slice(1);
  if (!p.startsWith("254")) return null;
  return p;
}

function expiryTime() {
  return new Date(Date.now() + 6 * 60 * 60 * 1000);
}

function getDeviceName() {
  const ua = navigator.userAgent;

  let os = "UnknownOS";
  let browser = "UnknownBrowser";

  if (/android/i.test(ua)) os = "Android";
  else if (/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
  else if (/Windows/i.test(ua)) os = "Windows";
  else if (/Mac/i.test(ua)) os = "Mac";

  if (/Edg/i.test(ua)) browser = "Edge";
  else if (/Chrome/i.test(ua)) browser = "Chrome";
  else if (/Firefox/i.test(ua)) browser = "Firefox";
  else if (/Safari/i.test(ua)) browser = "Safari";

  return os + "-" + browser;
}

async function getIPLocation() {
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    return {
      ip: data.ip || "Unknown IP",
      city: data.city || "Unknown City",
      country: data.country_name || "Unknown Country"
    };
  } catch (error) {
    return {
      ip: "Unavailable",
      city: "Unknown",
      country: "Unknown"
    };
  }
}

function timeAgo(timestamp) {
  if (!timestamp) return "Never";

  const diff = Date.now() - timestamp.toDate().getTime();

  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (minutes < 1) return "just now";
  if (minutes < 60) return minutes + " minute(s) ago";
  if (hours < 24) return hours + " hour(s) ago";

  return days + " day(s) ago";
}

/* REGISTER */
async function registerUser() {
  const name = fullName.value.trim();
  const phone = normalizePhone(phoneInput.value.trim());
  const pass = password.value.trim();
  const confirm = confirmPassword.value.trim();

  if (!name || !phone || !pass || !confirm) return alert("Fill all fields");
  if (pass.length < 6) return alert("Password must be at least 6 characters");
  if (pass !== confirm) return alert("Passwords do not match");

  const ref = doc(db, "viewers", phone);
  const snap = await getDoc(ref);

  if (snap.exists()) return alert("Account exists");

  await setDoc(ref, {
    full_name: name,
    phone,
    password: pass,
    expires_at: expiryTime(),
    is_logged_in: false,
    is_approved: false,
    device_id: null,
    created_at: serverTimestamp()
  });

  alert("Registered. Contact admin for activation.");
}

/* LOGIN */
async function loginUser() {
  const phone = normalizePhone(loginPhone.value.trim());
  const pass = loginPassword.value.trim();

  let device = localStorage.getItem("deviceID");

  if (!device) {
    const uniquePart = Math.random().toString(36).substring(2, 10);
    device = getDeviceName() + "-dev_" + uniquePart;
    localStorage.setItem("deviceID", device);
  }

  const locationInfo = await getIPLocation();

  const ref = doc(db, "viewers", phone);
  const snap = await getDoc(ref);

  if (!snap.exists()) return alert("No account");

  const user = snap.data();

  if (!user.is_approved) return alert("Not approved. Contact admin.");
  if (Date.now() > user.expires_at.toDate().getTime()) return alert("Expired");
  if (user.password !== pass) return alert("Wrong password");

  if (user.device_id && user.device_id !== device) {
    const lastSeen = timeAgo(user.last_login_at);

    const acceptSwitch = confirm(
      "Last device used:\n" +
      (user.device_name || "Unknown Device") +
      "\n" +
      (user.last_city || "Unknown City") + ", " +
      (user.last_country || "Unknown Country") +
      "\n" +
      lastSeen +
      "\n\nDo you want to switch to this device?"
    );

    if (!acceptSwitch) {
      return alert("Login cancelled.");
    }
  }

  await updateDoc(ref, {
    is_logged_in: true,
    device_id: device,
    device_name: getDeviceName(),
    last_ip: locationInfo.ip,
    last_city: locationInfo.city,
    last_country: locationInfo.country,
    last_login_at: serverTimestamp()
  });

  localStorage.setItem("activeUser", phone);
  showStream();
}

/* CHANGE PASSWORD */
async function changePassword() {
  const phone = localStorage.getItem("activeUser");
  const newPass = newPassword.value.trim();

  if (!newPass || newPass.length < 6) {
    return alert("Password must be at least 6 characters");
  }

  await updateDoc(doc(db, "viewers", phone), {
    password: newPass
  });

  alert("Password updated successfully");
}

/* LOGOUT */
async function logoutUser() {
  const phone = localStorage.getItem("activeUser");

  if (phone) {
    await updateDoc(doc(db, "viewers", phone), {
      is_logged_in: false
    });

    localStorage.removeItem("activeUser");
  }

  location.reload();
}

/* AUTO LOGOUT IF DEVICE SWITCHED */
async function monitorSession() {
  const phone = localStorage.getItem("activeUser");
  const device = localStorage.getItem("deviceID");

  if (!phone || !device) return;

  const ref = doc(db, "viewers", phone);

  setInterval(async () => {
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      alert("Session ended.");
      logoutUser();
      return;
    }

    const user = snap.data();

    if (user.device_id !== device) {
      alert("Your account was opened on another device.");
      logoutUser();
    }
  }, 3000);
}

/* SHOW STREAM SELECTION MENU */
function showStream() {
  lockScreen.style.display = "none";
  streamMenu.style.display = "block";
  monitorSession();
}

function selectStream(type){
  streamMenu.style.display = "none";
  if(type==='twitch'){
    twitchContainer.style.display='flex';
  } else if(type==='iptv'){
    iptvContainer.style.display='flex';
    loadIPTV();
  }
}

/* IPTV Logic */
import Hls from "https://cdn.jsdelivr.net/npm/hls.js@latest";
let hls;
let allChannels = [];

function loadIPTV(){
  const m3uLink = "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/usa.m3u";
  fetch(m3uLink)
    .then(res=>res.text())
    .then(data=>{
      allChannels = parseM3U(data);
      renderChannels(allChannels);
      if(allChannels.length>0) playChannel(allChannels[0].url);
    });
}

function parseM3U(data){
  const lines = data.split('\n');
  const channels = [];
  let current = {};
  lines.forEach(line=>{
    line=line.trim();
    if(line.startsWith('#EXTINF:')){
      const nameMatch=line.match(/,(.+)$/);
      const groupMatch=line.match(/group-title="([^"]+)"/);
      const logoMatch=line.match(/tvg-logo="([^"]+)"/);
      current = {
        name:nameMatch?nameMatch[1]:"Unknown",
        group:groupMatch?groupMatch[1]:"Others",
        logo:logoMatch?logoMatch[1]:"",
        url:""
      };
    } else if(line && !line.startsWith('#')){
      current.url=line;
      channels.push(current);
    }
  });
  return channels;
}

function renderChannels(channels){
  channelList.innerHTML="";
  const groups={};
  channels.forEach(ch=>{
    if(!groups[ch.group]) groups[ch.group]=[];
    groups[ch.group].push(ch);
  });

  for(let group in groups){
    let cat=document.createElement('div');
    cat.style.padding="8px";
    cat.style.fontWeight="bold";
    cat.style.color="#38bdf8";
    cat.innerText=group;
    channelList.appendChild(cat);

    groups[group].forEach(ch=>{
      let div=document.createElement('div');
      div.style.padding="8px";
      div.style.cursor="pointer";
      div.style.borderBottom="1px solid #1e293b";
      div.style.display="flex";
      div.style.alignItems="center";

      if(ch.logo){
        let img=document.createElement('img');
        img.src=ch.logo;
        img.style.width="25px";
        img.style.height="25px";
        img.style.objectFit="contain";
        img.style.marginRight="6px";
        div.appendChild(img);
      }

      let text=document.createElement('span');
      text.innerText=ch.name;
      div.appendChild(text);

      div.onclick=()=>playChannel(ch.url);
      channelList.appendChild(div);
    });
  }
}

function playChannel(url){
  if(hls) hls.destroy();
  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src=url;
  }
}

window.onload=()=>{
  registerBtn.onclick=registerUser;
  loginBtn.onclick=loginUser;
  logoutBtn.onclick=logoutUser;
  changePassBtn.onclick=changePassword;
};
</script>
