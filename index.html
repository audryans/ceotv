<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CEO KPL TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBxuc3suKfedfLcBIHNkfNQ9kUlZr2y1FQ",
  authDomain: "twitch-user-access.firebaseapp.com",
  projectId: "twitch-user-access",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* HELPERS */
function normalizePhone(input) {
  let p = input.replace(/\D/g, "");
  if (p.startsWith("0")) p = "254" + p.slice(1);
  if (!p.startsWith("254")) return null;
  return p;
}

function expiryTime() {
  return new Date(Date.now() + 6 * 60 * 60 * 1000);
}

/* REGISTER */
async function registerUser() {
  const name = document.getElementById("fullName").value.trim();
  const phone = normalizePhone(document.getElementById("phone").value.trim());
  const pass = document.getElementById("password").value.trim();
  const confirm = document.getElementById("confirmPassword").value.trim();

  if (!name || !phone || !pass || !confirm) return alert("Fill all fields");
  if (pass.length < 6) return alert("Password must be at least 6 characters");
  if (pass !== confirm) return alert("Passwords do not match");

  const ref = doc(db, "viewers", phone);
  const snap = await getDoc(ref);

  if (snap.exists()) return alert("Account already exists.");

  await setDoc(ref, {
    full_name: name,
    phone,
    password: pass,
    expires_at: expiryTime(),
    is_logged_in: false,
    is_approved: false,
    created_at: serverTimestamp()
  });

  alert("Registered. Wait for admin approval.");
}

/* LOGIN */
async function loginUser() {
  const phone = normalizePhone(document.getElementById("loginPhone").value.trim());
  const pass = document.getElementById("loginPassword").value.trim();

  if (!phone || !pass) return alert("Enter phone and password");

  const ref = doc(db, "viewers", phone);
  const snap = await getDoc(ref);

  if (!snap.exists()) return alert("Account not found");

  const user = snap.data();

  if (!user.is_approved) return alert("Not activated yet");
  if (Date.now() > user.expires_at.toDate().getTime()) return alert("Expired");
  if (user.password !== pass) return alert("Wrong password");
  if (user.is_logged_in) return alert("Already in use");

  await updateDoc(ref, { is_logged_in: true });
  localStorage.setItem("activeUser", phone);
  showStream();
}

/* LOGOUT */
async function logoutUser() {
  const phone = localStorage.getItem("activeUser");
  if (phone) {
    await updateDoc(doc(db, "viewers", phone), { is_logged_in: false });
    localStorage.removeItem("activeUser");
  }
  location.reload();
}

/* TV FUNCTIONS */
function playTwitch(channel) {
  openPlayer(`https://player.twitch.tv/?channel=${channel}&parent=localhost&autoplay=true&muted=true`);
}

function playYouTube(id) {
  openPlayer(`https://www.youtube.com/embed/${id}?autoplay=1&mute=1`);
}

function openPlayer(url) {
  document.getElementById("channelGrid").style.display = "none";
  document.getElementById("playerWrap").style.display = "block";
  document.getElementById("player").src = url;
}

function closePlayer() {
  document.getElementById("player").src = "";
  document.getElementById("playerWrap").style.display = "none";
  document.getElementById("channelGrid").style.display = "grid";
}

/* UI */
function showStream() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("streamWrap").style.display = "flex";
}

/* EVENTS */
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("registerBtn").onclick = registerUser;
  document.getElementById("loginBtn").onclick = loginUser;
  document.getElementById("logoutBtn").onclick = logoutUser;
});
</script>

<style>
body { margin:0; background:#000; font-family:Arial; color:#00ffe7; }

#lockScreen { height:100vh; display:flex; justify-content:center; align-items:center; }

.card {
  width:360px;
  padding:28px;
  border-radius:14px;
  background:#000;
  border:2px solid #00ffe7;
  text-align:center;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:linear-gradient(90deg,#00ffe7,#ff00ff);
  font-weight:bold;
  cursor:pointer;
}

.switch { margin-top:14px; color:#ff00ff; cursor:pointer; }

#streamWrap {
  display:none;
  flex-direction:column;
  height:100vh;
}

.logout-btn {
  position:absolute;
  top:10px;
  right:10px;
  padding:10px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
}

/* CHANNEL GRID */
#channelGrid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap:12px;
  padding:12px;
  flex:1;
}

.channel {
  background:#111;
  border:2px solid #00ffe7;
  border-radius:12px;
  padding:20px;
  text-align:center;
  cursor:pointer;
}

.channel:hover {
  background:#00ffe7;
  color:#000;
}

#streamWrap {
  display: flex;
  justify-content: flex-end;
  padding: 10px 20px;
  background-color: #f4f4f4;
}

.logout-btn {
  background-color: #ff4b2b;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.3s ease;
}

.logout-btn:hover {
  background-color: #e63e1d;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div id="lockScreen">
  <div class="card" id="registerCard">
    <h2>Register</h2>
    <input id="fullName" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="password" type="password" placeholder="Password">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">
    <button id="registerBtn">Register</button>
    <div class="switch" onclick="registerCard.style.display='none';loginCard.style.display='block'">
      Login instead
    </div>
  </div>

  <div class="card" id="loginCard" style="display:none;">
    <h2>Login</h2>
    <input id="loginPhone" placeholder="Phone Number">
    <input id="loginPassword" type="password" placeholder="Password">
    <button id="loginBtn">Enter TV</button>

    <a href="https://wa.me/254725820123" target="_blank">
      <button style="background:#25D366;">Contact Admin</button>
    </a>

    <div class="switch" onclick="loginCard.style.display='none';registerCard.style.display='block'">
      Back
    </div>
  </div>
</div>

<!-- TV UI -->
<div id="streamWrap">

  <button id="logoutBtn" class="logout-btn">LOGOUT</button>

  <!-- CHANNEL GRID -->
  <div id="channelGrid">
    <div class="channel" onclick="playTwitch(<iframe src="https://player.twitch.tv/?channel=kpltv1&parent=audryans.github.io&autoplay=true&muted=true")">KPL TV</div>
    <div class="channel" onclick="playTwitch('monstercat')">Music TV</div>
    <div class="channel" onclick="playYouTube('5qap5aO4i9A')">LoFi</div>
    <div class="channel" onclick="playYouTube('jfKfPfyJRdk')">Chill Beats</div>
  </div>

  <!-- PLAYER -->
  <div id="playerWrap">
    <button onclick="closePlayer()" class="logout-btn" style="left:10px; right:auto;">BACK</button>
    <iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

</div>

</body>
</html>
