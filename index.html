<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CEO Ryan Private Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxuc3suKfedfLcBIHNkfNQ9kUlZr2y1FQ",
  authDomain: "twitch-user-access.firebaseapp.com",
  projectId: "twitch-user-access",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function normalizePhone(input) {
  let p = input.replace(/\D/g, "");
  if (p.startsWith("0")) p = "254" + p.slice(1);
  if (!p.startsWith("254")) return null;
  return p;
}

function expiryTime() {
  return new Date(Date.now() + 6 * 60 * 60 * 1000);
}

/* REGISTER */
async function registerUser() {
  const name = fullName.value.trim();
  const phone = normalizePhone(phoneInput.value.trim());
  const pass = password.value.trim();
  const confirm = confirmPassword.value.trim();

  if (!name || !phone || !pass || !confirm) return alert("Fill all fields");
  if (pass.length < 6) return alert("Password must be at least 6 characters");
  if (pass !== confirm) return alert("Passwords do not match");

  const ref = doc(db, "viewers", phone);
  const snap = await getDoc(ref);
  if (snap.exists()) return alert("Account exists");

  await setDoc(ref, {
    full_name: name,
    phone,
    password: pass,
    expires_at: expiryTime(),
    is_logged_in: false,
    is_approved: false,
    device_id: null,
    created_at: serverTimestamp()
  });

  alert("Registered. Contact admin for activation.");
}

/* LOGIN */
async function loginUser() {
  const phone = normalizePhone(loginPhone.value.trim());
  const pass = loginPassword.value.trim();
  const device = localStorage.getItem("deviceID") || Math.random().toString(36);

  localStorage.setItem("deviceID", device);

  const ref = doc(db, "viewers", phone);
  const snap = await getDoc(ref);

  if (!snap.exists()) return alert("No account");

  const user = snap.data();

  if (!user.is_approved) return alert("Not approved. Contact admin.");
  if (Date.now() > user.expires_at.toDate().getTime()) return alert("Expired");
  if (user.password !== pass) return alert("Wrong password");

  if (user.device_id && user.device_id !== device) {
    return alert("Another device already active");
  }

  await updateDoc(ref, {
    is_logged_in: true,
    device_id: user.device_id || device
  });

  localStorage.setItem("activeUser", phone);
  showStream();
}

/* CHANGE PASSWORD */
async function changePassword() {
  const phone = localStorage.getItem("activeUser");
  const newPass = newPassword.value.trim();

  if (!newPass || newPass.length < 6) {
    return alert("Password must be at least 6 characters");
  }

  await updateDoc(doc(db, "viewers", phone), {
    password: newPass
  });

  alert("Password updated successfully");
}

/* LOGOUT */
async function logoutUser() {
  const phone = localStorage.getItem("activeUser");
  if (phone) {
    await updateDoc(doc(db, "viewers", phone), {
      is_logged_in: false
    });
    localStorage.removeItem("activeUser");
  }
  location.reload();
}

function showStream() {
  lockScreen.style.display = "none";
  streamWrap.style.display = "block";
}

window.onload = () => {
  registerBtn.onclick = registerUser;
  loginBtn.onclick = loginUser;
  logoutBtn.onclick = logoutUser;
  changePassBtn.onclick = changePassword;
};
</script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0a0a0a);
  color:#fff;
}

#lockScreen {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  width:340px;
  padding:25px;
  border-radius:16px;
  background:#111;
  box-shadow:0 0 20px rgba(0,255,231,0.2);
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:linear-gradient(90deg,#00ffe7,#ff00ff);
  cursor:pointer;
  font-weight:bold;
}

.whatsapp-btn {
  background:#25D366;
  color:#fff;
}

.switch {
  margin-top:12px;
  cursor:pointer;
  color:#00ffe7;
}

/* STREAM */
#streamWrap {
  display:none;
  height:100vh;
}

iframe {
  width:100%;
  height:100%;
}

/* LOGOUT */
.logout-btn {
  position:fixed;
  top:15px;
  right:15px;
  padding:8px 14px;
  font-size:12px;
  border-radius:20px;
  background:#ff004c;
  color:#fff;
  border:none;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

.logout-btn:hover {
  transform:scale(0.9);
}

@keyframes pulse {
  0% { box-shadow:0 0 5px #ff004c; }
  50% { box-shadow:0 0 20px #ff004c; }
  100% { box-shadow:0 0 5px #ff004c; }
}

/* ACCOUNT PANEL */
.account-panel {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.account-panel input {
  width:200px;
}

.small-btn {
  width:auto;
  padding:10px 15px;
  background:#00ffe7;
  color:#000;
}
</style>
</head>

<body>

<div id="lockScreen">
  <div class="card" id="registerCard">
    <h2>Register</h2>
    <input id="fullName" placeholder="Full Name">
    <input id="phoneInput" placeholder="Phone">
    <input id="password" type="password" placeholder="Password">
    <input id="confirmPassword" type="password" placeholder="Confirm Password">
    <button id="registerBtn">Register</button>
    <div class="switch" onclick="registerCard.style.display='none';loginCard.style.display='block'">
      Login
    </div>
  </div>

  <div class="card" id="loginCard" style="display:none;">
    <h2>Login</h2>
    <input id="loginPhone" placeholder="Phone">
    <input id="loginPassword" type="password" placeholder="Password">
    <button id="loginBtn">Enter</button>

    <!-- CONTACT ADMIN -->
    <a href="https://wa.me/254725820123?text=Hello%20Admin,%20I%20have%20registered%20but%20my%20account%20is%20not%20activated.%20Please%20assist." target="_blank">
      <button class="whatsapp-btn">
        Contact Admin (Not Activated?)
      </button>
    </a>

    <div class="switch" onclick="loginCard.style.display='none';registerCard.style.display='block'">
      Back
    </div>
  </div>
</div>

<div id="streamWrap">
  <button id="logoutBtn" class="logout-btn">Logout</button>

  <iframe src="https://player.twitch.tv/?channel=kpltv1&parent=audryans.github.io"></iframe>

  <div class="account-panel">
    <input id="newPassword" placeholder="New Password">
    <button id="changePassBtn" class="small-btn">Change Password</button>
  </div>
</div>

</body>
</html>
